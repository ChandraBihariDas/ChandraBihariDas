<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <!-- JavaScript emphasis gradient -->
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7DF1E"/>
      <stop offset="100%" stop-color="#D4C00A"/>
    </linearGradient>
    <!-- Category label colors -->
    <linearGradient id="catLang" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#00A0CC"/>
    </linearGradient>
    <linearGradient id="catFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#5B1FCC"/>
    </linearGradient>
    <linearGradient id="catBack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00CC6A"/>
    </linearGradient>
    <linearGradient id="catData" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#CC0058"/>
    </linearGradient>
    <linearGradient id="catCloud" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#CC9300"/>
    </linearGradient>
    <linearGradient id="catAI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <!-- Card bg -->
    <linearGradient id="techCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0D0D14"/>
    </linearGradient>
    <!-- Glow for JS -->
    <filter id="jsGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.97
                0 0 0 0 0.87
                0 0 0 0 0.12
                0 0 0 0.4 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Tech chip symbol -->
    <symbol id="techChip" viewBox="0 0 80 28">
      <rect width="80" height="28" rx="8" fill="url(#techCardBg)"
        stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
    </symbol>
    <symbol id="techChipWide" viewBox="0 0 92 28">
      <rect width="92" height="28" rx="8" fill="url(#techCardBg)"
        stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#0A0A0F" rx="16"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
    font-size="20" font-weight="700" fill="#E4E4E7" letter-spacing="0.5">
    Tech Stack
  </text>

  <!-- ═══ LANGUAGES ═══ -->
  <g transform="translate(30, 60)">
    <rect width="8" height="8" rx="4" fill="url(#catLang)" opacity="0.8"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#00C9FF" letter-spacing="1">PRIMARY LANGUAGES</text>

    <g transform="translate(0, 20)">
      <!-- JavaScript — EMPHASIZED -->
      <g filter="url(#jsGlow)">
        <rect width="100" height="34" rx="10" fill="url(#jsGrad)"/>
        <text x="50" y="22" text-anchor="middle"
          font-family="'SF Mono', monospace" font-size="13" font-weight="700" fill="#000000">JavaScript</text>
      </g>
      <!-- C++ -->
      <g transform="translate(112, 3)">
        <rect width="56" height="28" rx="8" fill="url(#techCardBg)"
          stroke="#00599C" stroke-width="1" stroke-opacity="0.4"/>
        <text x="28" y="18" text-anchor="middle"
          font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#00599C">C++</text>
      </g>
      <!-- Python -->
      <g transform="translate(180, 3)">
        <use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle"
          font-family="'SF Mono', monospace" font-size="10" fill="#3776AB">Python</text>
      </g>
      <!-- TypeScript -->
      <g transform="translate(272, 3)">
        <use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle"
          font-family="'SF Mono', monospace" font-size="10" fill="#3178C6">TypeScript</text>
      </g>
      <!-- HTML -->
      <g transform="translate(364, 3)">
        <rect width="56" height="28" rx="8" fill="url(#techCardBg)"
          stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
        <text x="28" y="18" text-anchor="middle"
          font-family="'SF Mono', monospace" font-size="10" fill="#E34F26">HTML</text>
      </g>
      <!-- CSS -->
      <g transform="translate(432, 3)">
        <rect width="56" height="28" rx="8" fill="url(#techCardBg)"
          stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
        <text x="28" y="18" text-anchor="middle"
          font-family="'SF Mono', monospace" font-size="10" fill="#1572B6">CSS</text>
      </g>
    </g>
  </g>

  <!-- ═══ FRONTEND ═══ -->
  <g transform="translate(30, 130)">
    <rect width="8" height="8" rx="4" fill="url(#catFront)" opacity="0.8"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#7B2FFF" letter-spacing="1">FRONTEND</text>

    <g transform="translate(0, 20)">
      <g><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#61DAFB">React</text></g>
      <g transform="translate(92, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#E4E4E7">Next.js</text></g>
      <g transform="translate(184, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#DD0031">Angular</text></g>
      <g transform="translate(276, 0)"><use href="#techChipWide" width="92" height="28"/>
        <text x="46" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#06B6D4">TailwindCSS</text></g>
      <g transform="translate(380, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#7952B3">Bootstrap</text></g>
      <g transform="translate(472, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#02569B">Flutter</text></g>
    </g>
  </g>

  <!-- ═══ BACKEND ═══ -->
  <g transform="translate(30, 200)">
    <rect width="8" height="8" rx="4" fill="url(#catBack)" opacity="0.8"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#00FF88" letter-spacing="1">BACKEND</text>

    <g transform="translate(0, 20)">
      <g><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#339933">Node.js</text></g>
      <g transform="translate(92, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#E4E4E7">Express</text></g>
      <g transform="translate(184, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#009688">FastAPI</text></g>
      <g transform="translate(276, 0)"><rect width="56" height="28" rx="8" fill="url(#techCardBg)" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
        <text x="28" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#E4E4E7">JWT</text></g>
      <g transform="translate(344, 0)"><rect width="56" height="28" rx="8" fill="url(#techCardBg)" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
        <text x="28" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#CB3837">NPM</text></g>
    </g>
  </g>

  <!-- ═══ DATABASES ═══ -->
  <g transform="translate(30, 270)">
    <rect width="8" height="8" rx="4" fill="url(#catData)" opacity="0.8"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#FF006E" letter-spacing="1">DATABASES</text>

    <g transform="translate(0, 20)">
      <g><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#47A248">MongoDB</text></g>
      <g transform="translate(92, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#4479A1">MySQL</text></g>
      <g transform="translate(184, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#FFCA28">Firebase</text></g>
    </g>
  </g>

  <!-- ═══ CLOUD & DEVOPS ═══ -->
  <g transform="translate(30, 340)">
    <rect width="8" height="8" rx="4" fill="url(#catCloud)" opacity="0.8"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#FFB800" letter-spacing="1">CLOUD &amp; TOOLS</text>

    <g transform="translate(0, 20)">
      <g><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#E4E4E7">Vercel</text></g>
      <g transform="translate(92, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#46E3B7">Render</text></g>
      <g transform="translate(184, 0)"><rect width="56" height="28" rx="8" fill="url(#techCardBg)" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.06"/>
        <text x="28" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#F05032">Git</text></g>
      <g transform="translate(252, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#E4E4E7">GitHub</text></g>
      <g transform="translate(344, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#F24E1E">Figma</text></g>
    </g>
  </g>

  <!-- ═══ AI / ML ═══ -->
  <g transform="translate(30, 410)">
    <rect width="8" height="8" rx="4" fill="url(#catAI)" opacity="0.8"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="10" font-weight="600" fill="#FF006E" letter-spacing="1">AI / DATA SCIENCE</text>

    <g transform="translate(0, 20)">
      <g><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#013243">NumPy</text></g>
      <g transform="translate(92, 0)"><use href="#techChip" width="80" height="28"/>
        <text x="40" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#150458">Pandas</text></g>
      <g transform="translate(184, 0)"><use href="#techChipWide" width="92" height="28"/>
        <text x="46" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#E4E4E7">Matplotlib</text></g>
      <g transform="translate(288, 0)"><use href="#techChipWide" width="92" height="28"/>
        <text x="46" y="18" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#44A833">Anaconda</text></g>
    </g>
  </g>

  <!-- Tech count summary -->
  <text x="870" y="465" text-anchor="end"
    font-family="'SF Mono', monospace" font-size="10" fill="#71717A" opacity="0.5">
    30 technologies
  </text>
</svg>
