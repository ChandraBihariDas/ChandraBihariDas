<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40">
  <defs>
    <linearGradient id="bgFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9FF" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00C9FF" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#7B2FFF" stop-opacity="0.03"/>
      <stop offset="85%" stop-color="#00C9FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00C9FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C9FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C9FF" stop-opacity="0"/>
    </radialGradient>
    <symbol id="dot" viewBox="0 0 4 4">
      <circle cx="2" cy="2" r="0.6" fill="#E4E4E7" opacity="0.06"/>
    </symbol>
  </defs>

  <!-- Ambient glow -->
  <rect width="1200" height="40" fill="url(#bgFade)"/>

