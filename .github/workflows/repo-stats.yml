name: Repository Stats

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  stats:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Generate Repo Stats
        run: |
          # Fetch public repo data from GitHub API
          STATS=$(curl -s "https://api.github.com/users/${{ github.repository_owner }}")
          REPOS=$(echo "$STATS" | jq '.public_repos')
          FOLLOWERS=$(echo "$STATS" | jq '.followers')
          FOLLOWING=$(echo "$STATS" | jq '.following')

          echo "## Repository Statistics" > assets/repo-stats.md
          echo "" >> assets/repo-stats.md
          echo "| Metric | Value |" >> assets/repo-stats.md
          echo "|:---|:---:|" >> assets/repo-stats.md
          echo "| Public Repos | $REPOS |" >> assets/repo-stats.md
          echo "| Followers | $FOLLOWERS |" >> assets/repo-stats.md
          echo "| Following | $FOLLOWING |" >> assets/repo-stats.md
          echo "| Updated | $(date -u '+%Y-%m-%d') |" >> assets/repo-stats.md

      - name: Commit Stats
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add assets/repo-stats.md || true
          git diff --staged --quiet || git commit -m "chore: update repository stats"
          git push || true
