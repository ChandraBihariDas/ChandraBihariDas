name: Developer Quote

on:
  schedule:
    - cron: "0 */8 * * *"  # Every 8 hours
  workflow_dispatch:

jobs:
  quote:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Generate Quote Card
        uses: PiyushSuthar/github-readme-quotes@main
        with:
          THEME: dark
          QUOTE_TYPE: horizontal
          OUTPUT_FILE: assets/quote.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Quote
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add assets/quote.svg || true
          git diff --staged --quiet || git commit -m "chore: update developer quote"
          git push || true
